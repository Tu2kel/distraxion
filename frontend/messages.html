<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <meta name="theme-color" content="#2a000a" />
    <title>Messages — CenTex Distraxion</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./style.css" />
    <link rel="stylesheet" href="./global.css" />
    <link rel="stylesheet" href="./messages.css" />
    <link rel="stylesheet" href="./global.css" />
    <script defer src="./app.js"></script>
  </head>
  <body>
    <div class="shell-frame">
      <div class="shell">
        <!-- TOP BAR -->
        <div class="page-bar">
          <div class="page-title">Messages</div>
          <button class="filter-btn">&#9776;</button>
        </div>

        <!-- MATCH STRIP -->
        <div class="match-strip-wrap">
          <div class="match-strip-label">New Matches</div>
          <div class="match-strip" id="match-strip">
            <div class="match-bubble active">
              <div class="bubble-avatar">&#128105;&#127997;</div>
              <div class="bubble-name">Jessica</div>
            </div>
            <div class="match-bubble">
              <div class="bubble-avatar">&#128104;&#127998;</div>
              <div class="bubble-name">Marcus</div>
            </div>
            <div class="match-bubble">
              <div class="bubble-avatar">&#128105;&#127995;</div>
              <div class="bubble-name">Aaliyah</div>
            </div>
            <div class="match-bubble new">
              <div class="bubble-avatar">&#128105;&#127996;</div>
              <div class="bubble-name">Priya</div>
            </div>
          </div>
        </div>

        <div class="divider-thin"></div>

        <!-- CONVERSATION LIST -->
        <div class="conv-list" id="conv-list">
          <div class="conv-item" onclick="openThread('jessica')">
            <div class="conv-avatar">&#128105;&#127997;</div>
            <div class="conv-info">
              <div class="conv-header">
                <span class="conv-name">Jessica R.</span>
                <span class="conv-time">2h</span>
              </div>
              <div class="conv-preview">
                Still waiting on the best BBQ rec...
              </div>
            </div>
            <div class="conv-unread">2</div>
          </div>
          <div class="conv-item" onclick="openThread('marcus')">
            <div class="conv-avatar">&#128104;&#127998;</div>
            <div class="conv-info">
              <div class="conv-header">
                <span class="conv-name">Marcus T.</span>
                <span class="conv-time">Yesterday</span>
              </div>
              <div class="conv-preview">You: What part of town are you in?</div>
            </div>
          </div>
          <div class="conv-item" onclick="openThread('aaliyah')">
            <div class="conv-avatar">&#128105;&#127995;</div>
            <div class="conv-info">
              <div class="conv-header">
                <span class="conv-name">Aaliyah M.</span>
                <span class="conv-time">Mon</span>
              </div>
              <div class="conv-preview">haha yes I have like 14 plants now</div>
            </div>
          </div>

          <!-- EMPTY STATE (hidden when convs exist) -->
          <!--
        <div class="empty-msgs">
          <div class="empty-icon">&#128172;</div>
          <div class="empty-title">No messages yet</div>
          <div class="empty-sub">When you match, your conversations will show up here.</div>
          <button class="btn-gold" onclick="window.location.href='browse.html'">Start Browsing</button>
        </div>
        --></div>

        <!-- BOTTOM NAV -->
        <nav class="bnav">
          <button
            class="bnav-item"
            onclick="window.location.href = 'browse.html'"
          >
            <span class="bnav-icon">&#128293;</span
            ><span class="bnav-label">Browse</span>
          </button>
          <button class="bnav-item on">
            <span class="bnav-icon">&#128172;</span
            ><span class="bnav-label">Messages</span>
          </button>
          <button
            class="bnav-item"
            onclick="window.location.href = 'profile.html'"
          >
            <span class="bnav-icon">&#128100;</span
            ><span class="bnav-label">Profile</span>
          </button>
          <button
            class="bnav-item"
            onclick="window.location.href = 'settings.html'"
          >
            <span class="bnav-icon">&#9881;</span
            ><span class="bnav-label">Settings</span>
          </button>
        </nav>
      </div>
      <!-- /.shell -->
    </div>
    <!-- /.shell-frame -->
    <script>
      function openThread(user) {
        // Wire to real message thread page when built
        alert("Message thread coming soon — " + user);
      }
    </script>
  </body>
</html>
