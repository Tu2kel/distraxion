<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <meta name="theme-color" content="#2a000a" />
    <title>Browse — CenTex Distraxion</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./assets/style.css" />
    <link rel="stylesheet" href="./assets/browse.css" />
    <link rel="stylesheet" href="./assets/global.css" />
    <script defer src="./assets/app.js"></script>
    <style>
      .lounge-teaser {
        margin-top: 12px;
        padding: 8px 12px;
        border-left: 3px solid #b76e79;
        background: rgba(183, 110, 121, 0.1);
        border-radius: 0 4px 4px 0;
        font-family: "Cinzel", serif;
        font-size: 9px;
        font-style: normal;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: #d4909a;
        line-height: 1.5;
      }
      .match-lounge-btn {
        width: 100%;
        margin-top: 10px;
        padding: 15px;
        border-radius: 100px;
        border: 1px solid rgba(240, 0, 45, 0.45);
        background: transparent;
        font-family: "Cinzel", serif;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.16em;
        color: #f0002d;
        cursor: pointer;
        transition: background 0.2s;
      }
      .match-lounge-btn:hover {
        background: rgba(240, 0, 45, 0.1);
      }
    </style>
  </head>
  <body>
    <div class="shell-frame">
      <div class="shell">
        <div class="browse-bar">
          <div class="b-logo">Distra<span class="gold-text">X</span>ion</div>
          <div class="bar-right">
            <span class="bar-loc">&#128205; CenTex</span>
            <div class="swipe-ctr" id="swipe-ctr">8 left today</div>
          </div>
        </div>

        <div class="card-area" id="card-area"></div>

        <div class="action-bar">
          <button class="act-btn act-pass" id="btn-pass">&#10005;</button>
          <button class="act-btn act-connect" id="btn-connect">&#9825;</button>
          <button class="act-btn act-boost" id="btn-boost">&#9889;</button>
        </div>

        <nav class="bnav">
          <button
            class="bnav-item on"
            onclick="window.location.href = 'browse.html'"
          >
            <span class="bnav-icon">&#128293;</span
            ><span class="bnav-label">Browse</span>
          </button>
          <button
            class="bnav-item"
            onclick="window.location.href = 'messages.html'"
          >
            <span class="bnav-icon">&#128172;</span
            ><span class="bnav-label">Messages</span>
          </button>
          <button
            class="bnav-item"
            onclick="window.location.href = 'profile.html'"
          >
            <span class="bnav-icon">&#128100;</span
            ><span class="bnav-label">Profile</span>
          </button>
          <button
            class="bnav-item"
            onclick="window.location.href = 'settings.html'"
          >
            <span class="bnav-icon">&#9881;</span
            ><span class="bnav-label">Settings</span>
          </button>
        </nav>
      </div>
      <!-- /.shell -->
    </div>
    <!-- /.shell-frame -->

    <!-- MATCH OVERLAY -->
    <div class="match-overlay" id="match-overlay" style="display: none">
      <div class="match-box">
        <div class="match-eyebrow">Congratulations</div>
        <div class="match-title">It's a<br />Match.</div>
        <div class="match-sub" id="match-sub">
          You and Jessica both said yes.
        </div>
        <div class="match-avatars">
          <div class="m-avatar">&#128100;</div>
          <div class="m-diamond">&#9830;</div>
          <div class="m-avatar" id="match-avatar">&#128105;&#127997;</div>
        </div>
        <div class="match-name" id="match-name">
          Don't leave Jessica on read.
        </div>
        <button
          class="btn-gold match-cta"
          onclick="alert('Messaging coming soon')"
        >
          Send a Message
        </button>
        <button
          class="match-lounge-btn"
          id="match-lounge-btn"
          onclick="openLoungeRoom()"
        >
          &#10005; Open Lounge Room
        </button>
        <span class="match-skip" id="match-skip">Keep Browsing &rarr;</span>
      </div>
    </div>

    <script>
      const PROFILES = [
        {
          name: "Jessica R.",
          age: 28,
          city: "Killeen",
          dist: "2 mi",
          emoji: "&#128105;&#127997;",
          bio: "Trauma nurse at CFRMC. Off duty I'm hiking Copperas Cove or finding the best BBQ in CenTex. Not here for games.",
          tags: ["Healthcare", "Outdoors", "Dog Mom", "Killeen"],
        },
        {
          name: "Marcus T.",
          age: 31,
          city: "Harker Heights",
          dist: "5 mi",
          emoji: "&#128104;&#127998;",
          bio: "IT contractor near post. Weekend car meets and H-E-B runs. Looking for something real, not another situationship.",
          tags: ["Tech", "Car Culture", "Harker Heights", "Serious"],
        },
        {
          name: "Aaliyah M.",
          age: 26,
          city: "Temple",
          dist: "18 mi",
          emoji: "&#128105;&#127995;",
          bio: "Dental hygienist. Temple native. Love a good food truck and live music on weekends. Ask me about my plants.",
          tags: ["Temple", "Music", "Foodie", "Plant Mom"],
        },
        {
          name: "Devon C.",
          age: 33,
          city: "Copperas Cove",
          dist: "8 mi",
          emoji: "&#128104;&#127995;",
          bio: "Prior service, now in logistics. Two dogs, one cat, and a grill I take very seriously. Quiet life, good people.",
          tags: ["Veteran", "Outdoors", "Copperas Cove", "Laid Back"],
        },
        {
          name: "Priya S.",
          age: 29,
          city: "Killeen",
          dist: "3 mi",
          emoji: "&#128105;&#127996;",
          bio: "Physical therapist at Fort Cavazos clinic. Yoga, hiking, and aggressively competitive at board games. Fair warning.",
          tags: ["Healthcare", "Yoga", "Killeen", "Competitive"],
        },
        {
          name: "Tre L.",
          age: 27,
          city: "Waco",
          dist: "42 mi",
          emoji: "&#128104;&#127998;",
          bio: "Graphic designer, freelance. Baylor grad. Waco before it was cool. Looking for someone to explore with.",
          tags: ["Creative", "Waco", "Design", "Explorer"],
        },
      ];

      let swipesLeft = 8,
        cardIndex = 0,
        isDragging = false,
        startX = 0,
        startY = 0,
        curX = 0;
      let currentMatchName = "",
        currentMatchCity = "";

      document
        .getElementById("btn-pass")
        .addEventListener("click", () => swipeCard("left"));
      document
        .getElementById("btn-connect")
        .addEventListener("click", () => swipeCard("right"));
      document
        .getElementById("btn-boost")
        .addEventListener(
          "click",
          () => (window.location.href = "paywall.html"),
        );
      document.getElementById("match-skip").addEventListener("click", () => {
        document.getElementById("match-overlay").style.display = "none";
        renderCards();
      });

      function openLoungeRoom(name, city) {
        const n = name || currentMatchName || "";
        const c = city || currentMatchCity || "";
        const params = new URLSearchParams();
        if (n) params.set("match", n);
        if (c) params.set("city", c);
        window.location.href =
          "room.html" + (params.toString() ? "?" + params.toString() : "");
      }

      function renderCards() {
        const area = document.getElementById("card-area");
        area.innerHTML = "";
        updateCounter();
        if (cardIndex >= PROFILES.length) {
          area.innerHTML = `<div class="empty-card"><div class="empty-icon">&#9830;</div><div class="empty-title">You've Seen Everyone Nearby</div><div class="empty-sub">Check back tomorrow for new profiles,<br/>or expand your distance in settings.</div></div>`;
          return;
        }
        if (swipesLeft <= 0) {
          window.location.href = "paywall.html";
          return;
        }
        for (
          let i = Math.min(cardIndex + 1, PROFILES.length - 1);
          i >= cardIndex;
          i--
        ) {
          const p = PROFILES[i];
          const card = document.createElement("div");
          card.className = "swipe-card" + (i === cardIndex ? " top" : " under");
          card.innerHTML = `
            <div class="card-photo">
              <span class="card-emoji">${p.emoji}</span>
              <div class="card-photo-overlay"></div>
              <div class="card-id">
                <div class="card-name">${p.name}, ${p.age}</div>
                <div class="card-meta">&#128205; ${p.city} &nbsp;&middot;&nbsp; ${p.dist} away</div>
              </div>
              <div class="swipe-yes">YEAH</div>
              <div class="swipe-no">NOPE</div>
            </div>
            <div class="card-body">
              <div class="card-bio">${p.bio}</div>
              <div class="tags">${p.tags.map((t) => `<span class="tag">${t}</span>`).join("")}</div>
              <div class="lounge-teaser">Match to unlock the Lounge &mdash; meet live, not just on screen.</div>
            </div>`;
          area.appendChild(card);
        }
        bindDrag(document.querySelector(".swipe-card.top"));
      }

      function bindDrag(card) {
        if (!card) return;
        card.addEventListener("mousedown", dragStart);
        card.addEventListener("touchstart", dragStart, { passive: true });
      }
      function dragStart(e) {
        isDragging = true;
        startX = e.touches ? e.touches[0].clientX : e.clientX;
        startY = e.touches ? e.touches[0].clientY : e.clientY;
        document.addEventListener("mousemove", dragMove);
        document.addEventListener("mouseup", dragEnd);
        document.addEventListener("touchmove", dragMove, { passive: true });
        document.addEventListener("touchend", dragEnd);
      }
      function dragMove(e) {
        if (!isDragging) return;
        const x = e.touches ? e.touches[0].clientX : e.clientX;
        const y = e.touches ? e.touches[0].clientY : e.clientY;
        curX = x - startX;
        const card = document.querySelector(".swipe-card.top");
        if (!card) return;
        card.style.transform = `translate(${curX}px,${(y - startY) * 0.25}px) rotate(${curX * 0.07}deg)`;
        const yes = card.querySelector(".swipe-yes"),
          no = card.querySelector(".swipe-no");
        const pct = Math.min(Math.abs(curX) / 110, 1);
        yes.style.opacity = curX > 20 ? pct : 0;
        no.style.opacity = curX < -20 ? pct : 0;
      }
      function dragEnd() {
        isDragging = false;
        document.removeEventListener("mousemove", dragMove);
        document.removeEventListener("mouseup", dragEnd);
        document.removeEventListener("touchmove", dragMove);
        document.removeEventListener("touchend", dragEnd);
        const card = document.querySelector(".swipe-card.top");
        if (!card) return;
        if (curX > 90) swipeCard("right");
        else if (curX < -90) swipeCard("left");
        else {
          card.style.transform = "";
          card.querySelector(".swipe-yes").style.opacity = 0;
          card.querySelector(".swipe-no").style.opacity = 0;
        }
        curX = 0;
      }
      function swipeCard(dir) {
        const card = document.querySelector(".swipe-card.top");
        if (!card) return;
        swipesLeft = Math.max(0, swipesLeft - 1);
        updateCounter();
        card.classList.add("animating");
        card.style.transform = `translate(${dir === "right" ? "130vw" : "-130vw"},${dir === "right" ? "-15px" : "5px"}) rotate(${dir === "right" ? 28 : -28}deg)`;
        card.style.opacity = "0";
        const matched = dir === "right" && Math.random() > 0.45;
        setTimeout(() => {
          cardIndex++;
          if (matched) {
            const p = PROFILES[cardIndex - 1],
              fn = p.name.split(" ")[0];
            document.getElementById("match-sub").textContent =
              `You and ${fn} both said yes.`;
            document.getElementById("match-name").textContent =
              `Don't leave ${fn} on read.`;
            document.getElementById("match-avatar").innerHTML = p.emoji;
            currentMatchName = p.name;
            currentMatchCity = p.city;
            document.getElementById("match-overlay").style.display = "flex";
          } else if (swipesLeft <= 0) {
            window.location.href = "paywall.html";
          } else renderCards();
        }, 380);
      }
      function updateCounter() {
        const el = document.getElementById("swipe-ctr");
        if (!el) return;
        el.textContent =
          swipesLeft === 0 ? "Out of swipes" : `${swipesLeft} left today`;
        el.className = "swipe-ctr" + (swipesLeft <= 3 ? " low" : "");
      }

      renderCards();
    </script>
  </body>
</html>
