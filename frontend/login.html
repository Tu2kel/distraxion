<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <meta name="theme-color" content="#2a000a" />
    <title>Sign In — CenTex Distraxion</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./style.css" />
    <script defer src="./app.js"></script>
    <style>
      html,
      body {
        height: 100%;
        overflow: auto;
        background: var(--canvas);
      }
      body {
        background-image:
          radial-gradient(
            ellipse 70% 50% at 15% 0%,
            rgba(240, 0, 45, 0.5),
            transparent
          ),
          radial-gradient(
            ellipse 60% 45% at 85% 100%,
            rgba(240, 0, 45, 0.35),
            transparent
          );
        background-attachment: fixed;
        display: flex;
        align-items: flex-start;
        justify-content: center;
      }
      .login-page {
        width: 100%;
        max-width: 430px;
        min-height: 100vh;
        padding: 0 22px 40px;
        display: flex;
        flex-direction: column;
        color: var(--alabaster);
      }
      .login-top {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 20px 0 32px;
        flex-shrink: 0;
      }
      .back-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 36px;
        height: 36px;
        flex-shrink: 0;
        background: transparent;
        border: 1px solid var(--border);
        border-radius: 50%;
        color: var(--gold-s);
        font-size: 18px;
        cursor: pointer;
      }
      .login-title {
        font-family: "Cinzel", serif;
        font-size: 1.05rem;
        font-weight: 600;
        letter-spacing: 0.06em;
      }
      .login-hero {
        text-align: center;
        margin-bottom: 36px;
      }
      .login-wordmark {
        font-family: "Cinzel", serif;
        font-size: 38px;
        font-weight: 900;
        line-height: 1;
        margin-bottom: 6px;
      }
      .login-sub {
        font-family: "Cormorant Garamond", serif;
        font-style: italic;
        font-size: 16px;
        color: var(--muted);
        letter-spacing: 0.04em;
      }
      .divider {
        display: flex;
        align-items: center;
        gap: 12px;
        margin: 0 0 28px;
      }
      .divider-line {
        flex: 1;
        height: 5px;
        background: repeating-linear-gradient(
          to bottom,
          var(--gold-s) 0,
          var(--gold-s) 1px,
          transparent 1px,
          transparent 2px
        );
        opacity: 0.6;
      }
      .divider-line.l {
        -webkit-mask-image: linear-gradient(
          to right,
          transparent,
          black 40%,
          black 60%,
          transparent
        );
        mask-image: linear-gradient(
          to right,
          transparent,
          black 40%,
          black 60%,
          transparent
        );
      }
      .divider-line.r {
        -webkit-mask-image: linear-gradient(
          to left,
          transparent,
          black 40%,
          black 60%,
          transparent
        );
        mask-image: linear-gradient(
          to left,
          transparent,
          black 40%,
          black 60%,
          transparent
        );
      }
      .divider-diamond {
        width: 9px;
        height: 9px;
        background: var(--gold-s);
        transform: rotate(45deg);
        flex-shrink: 0;
        box-shadow:
          0 0 10px 2px rgba(201, 168, 76, 0.5),
          0 0 4px rgba(201, 168, 76, 0.9);
      }
      .flabel {
        display: block;
        font-size: 11px;
        letter-spacing: 0.08em;
        color: var(--gold-s);
        margin: 0 0 5px;
      }
      .finput {
        display: block;
        width: 100%;
        padding: 14px;
        margin: 0 0 16px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 10px;
        color: var(--alabaster);
        font-family: "Cormorant Garamond", serif;
        font-size: 16px;
        line-height: 1.3;
        -webkit-appearance: none;
        appearance: none;
        transition: border-color 0.2s;
      }
      .finput::placeholder {
        color: var(--muted);
      }
      .finput:focus {
        outline: none;
        border-color: var(--border-hi);
      }
      .forgot {
        display: block;
        text-align: right;
        margin-top: -10px;
        margin-bottom: 24px;
        font-family: "Cinzel", serif;
        font-size: 11px;
        letter-spacing: 0.05em;
        color: var(--gold-s);
        cursor: pointer;
      }
      .btn-gold {
        display: block;
        width: 100%;
        padding: 16px;
        border-radius: 100px;
        border: 1px solid var(--border-hi);
        cursor: pointer;
        background: transparent;
        font-family: "Cinzel", serif;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.16em;
        color: var(--alabaster);
        position: relative;
        overflow: hidden;
        transition:
          background 0.3s,
          color 0.3s,
          border-color 0.3s;
      }
      .btn-gold:hover {
        background: var(--gold);
        border-color: transparent;
        color: #1a0800;
      }
      .btn-gold::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(
          90deg,
          transparent,
          rgba(255, 255, 255, 0.22),
          transparent
        );
        transform: translateX(-100%);
        transition: transform 0.55s;
      }
      .btn-gold:hover::after {
        transform: translateX(100%);
      }
      .signup-link {
        margin-top: 16px;
        text-align: center;
        font-size: 13px;
        color: var(--muted);
      }
      .signup-link span {
        color: var(--gold-s);
        cursor: pointer;
      }
      .login-fine {
        margin-top: auto;
        padding-top: 32px;
        text-align: center;
        font-size: 10px;
        color: rgba(201, 168, 76, 0.2);
        letter-spacing: 0.06em;
        font-style: italic;
      }
      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(16px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .login-top {
        animation: fadeUp 0.45s 0.05s ease both;
      }
      .login-hero {
        animation: fadeUp 0.45s 0.12s ease both;
      }
      .divider {
        animation: fadeUp 0.45s 0.18s ease both;
      }
      .login-fields {
        animation: fadeUp 0.45s 0.24s ease both;
      }
      .login-cta {
        animation: fadeUp 0.45s 0.3s ease both;
      }
    </style>
  </head>
  <body>
    <div class="login-page">
      <header class="login-top">
        <button class="back-btn" onclick="history.back()">&#8592;</button>
        <h1 class="login-title">Welcome Back</h1>
      </header>

      <div class="login-hero">
        <div class="login-wordmark">
          <span
            style="
              background: var(--gold);
              -webkit-background-clip: text;
              -webkit-text-fill-color: transparent;
              background-clip: text;
            "
            >Distra</span
          ><span style="color: #f0002d; -webkit-text-fill-color: #f0002d"
            >X</span
          ><span
            style="
              background: var(--gold);
              -webkit-background-clip: text;
              -webkit-text-fill-color: transparent;
              background-clip: text;
            "
            >ion</span
          >
        </div>
        <div class="login-sub">Your distraction missed you.</div>
      </div>

      <div class="divider">
        <div class="divider-line l"></div>
        <div class="divider-diamond"></div>
        <div class="divider-line r"></div>
      </div>

      <div class="login-fields">
        <label class="flabel">Email</label>
        <input
          class="finput"
          id="email"
          type="email"
          placeholder="your@email.com"
          autocomplete="email"
        />

        <label class="flabel">Password</label>
        <input
          class="finput"
          id="password"
          type="password"
          placeholder="Your password"
          autocomplete="current-password"
        />

        <span class="forgot">Forgot password?</span>
      </div>

      <div class="login-cta">
        <button class="btn-gold" id="btn-login">SIGN IN</button>
        <div class="signup-link">
          New here?
          <span onclick="window.location.href = 'signup.html'"
            >Create a profile</span
          >
        </div>
      </div>

      <div class="login-fine">
        18+ only &nbsp;&#183;&nbsp; CenTex Distraxion &nbsp;&#183;&nbsp; Imperio
      </div>
    </div>

    <script>
      document
        .getElementById("btn-login")
        .addEventListener("click", async function () {
          const email = document.getElementById("email").value.trim();
          const password = document.getElementById("password").value;
          if (!email || !password) {
            alert("Email and password are required.");
            return;
          }
          try {
            // Wired to app.js login function
            if (typeof login === "function") {
              await login({ email, password });
              window.location.href = "browse.html";
            } else {
              console.warn("app.js login() not loaded yet");
            }
          } catch (err) {
            alert(err.message || "Login failed");
          }
        });
    </script>
  </body>
</html>
